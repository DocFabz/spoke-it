<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoke It</title>

<!-- Favicon & App Icons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
<link rel="shortcut icon" href="favicon-32x32.png">
<meta name="theme-color" content="#181c24">

<!-- Open Graph (Messenger, WhatsApp, Twitter…) -->
<meta property="og:title" content="Spoke It">
<meta property="og:description" content="Calculateur de longueur de rayons pour roues de vélo">
<meta property="og:image" content="https://docfabz.github.io/Spoke-It/favicon-512x512.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
 --bg:       #181c24;
 --bg2:      #1e2330;
 --card:     #232a38;
 --card-alt: #1a2030;
 --border:   rgba(255,255,255,0.07);
 --border-s: rgba(255,255,255,0.13);
 --accent:   #7ec8e3;
 --accent2:  #a8d8ea;
 --warm:     #e8927c;
 --warm2:    #f0b49a;
 --success:  #7ecfa8;
 --text:     #dce4ed;
 --text2:    #9aaabb;
 --text3:    #596778;
 --inp:      #161b27;
 --r:        14px;
 --rs:       9px;
 --sh:       0 4px 24px rgba(0,0,0,0.32);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
 background:var(--bg);
 color:var(--text);
 font-family:'DM Sans',sans-serif;
 font-weight:400;
 min-height:100vh;
 line-height:1.55;
 background-image:
   radial-gradient(ellipse 60% 40% at 15% 5%, rgba(126,200,227,.055) 0%,transparent 70%),
   radial-gradient(ellipse 50% 35% at 85% 95%,rgba(232,146,124,.04)  0%,transparent 70%);
}

/* ─ Header ─ */
header{text-align:center;padding:3.5rem 1rem 2rem}
.logo-ring{display:inline-block;width:50px;height:50px;margin-bottom:1.1rem;opacity:.5;animation:spin 20s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--text)}
.brand em{font-style:normal;color:var(--accent)}
.sub{font-family:'DM Mono',monospace;font-size:.67rem;font-weight:300;color:var(--text3);letter-spacing:.2em;margin-top:.45rem}
.insta-link{display:inline-flex;align-items:center;gap:.35rem;color:var(--text3);text-decoration:none;letter-spacing:.15em;transition:color .2s}
.insta-link:hover{color:var(--accent)}
.insta-icon{width:13px;height:13px;flex-shrink:0;vertical-align:middle}
.hline{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1.3rem auto 0}

/* ─ Layout ─ */
.wrap{max-width:880px;margin:0 auto;padding:0 1.2rem 4rem;display:flex;flex-direction:column;gap:1rem}

/* ─ Card ─ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem 1.8rem;box-shadow:var(--sh);transition:border-color .3s}
.card:hover{border-color:var(--border-s)}
.ch{display:flex;align-items:center;gap:.5rem;margin-bottom:1.35rem}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.55;flex-shrink:0}
.clabel{font-size:.63rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}

/* ─ Seg ─ */
.seg{display:flex;background:var(--inp);border:1px solid var(--border-s);border-radius:var(--rs);padding:3px;gap:3px}
.sb{flex:1;padding:.6rem 1rem;border:none;border-radius:calc(var(--rs) - 2px);background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .22s}
.sb.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,.4)}
.sb.active.w{color:var(--warm);text-shadow:0 0 12px rgba(232,146,124,.5)}
.sb.active.c{color:var(--accent);text-shadow:0 0 12px rgba(126,200,227,.5)}

/* ─ Grid ─ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:768px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr 1fr}.hub-top{grid-template-columns:1fr 1fr}}

/* ─ Fields ─ */
.f{display:flex;flex-direction:column;gap:.35rem}
label{font-size:.67rem;font-weight:500;letter-spacing:.07em;color:var(--text3);text-transform:uppercase}
input[type=number],select{background:var(--inp);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;font-weight:300;padding:.55rem .9rem;width:100%;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:rgba(126,200,227,.4);background:rgba(126,200,227,.025)}
input::placeholder{color:var(--text3);opacity:1}
select option{background:#161b27}

/* ─ Panel ─ */
.plabel{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:.38rem}
.plabel.L{color:var(--accent)}
.plabel.R{color:var(--warm)}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.L .pdot{background:var(--accent)}
.R .pdot{background:var(--warm)}

/* Hub top row */
.hub-top{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}

/* Hub sides: two columns always, separated by a thin line */
.hub-sides{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;background:var(--card-alt);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.hub-side{padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:.75rem}
.hub-divider{background:var(--border);width:1px;margin:0}

/* ─ Pills ─ */
.prow{display:flex;gap:.38rem;margin-bottom:1.1rem}
.pill{padding:.28rem .85rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .2s}
.pill.active{border-color:rgba(126,200,227,.4);color:var(--accent2);background:rgba(126,200,227,.07)}

.crow{display:flex;gap:.38rem}
.cp{flex:1;padding:.48rem;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.cp.active{border-color:rgba(126,200,227,.4);color:var(--accent2);background:rgba(126,200,227,.07)}

/* ─ Misc ─ */
.div{height:1px;background:var(--border);margin:1.15rem 0}
.help{font-size:.66rem;color:var(--text3);margin-top:.22rem;font-style:italic;line-height:1.4}

.sync{display:inline-flex;align-items:center;gap:.25rem;font-family:'DM Mono',monospace;font-size:.61rem;color:var(--success);opacity:0;transition:opacity .4s;margin-left:auto}
.sync.show{opacity:1}

/* ─ Lang button ─ */
.lang-btn{margin-top:1.1rem;background:transparent;border:1px solid var(--border-s);border-radius:20px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.65rem;font-weight:400;letter-spacing:.15em;padding:.28rem .9rem;cursor:pointer;transition:all .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ─ Button ─ */
.btn{width:100%;padding:1rem 1.5rem;background:var(--card);border:1px solid rgba(126,200,227,.22);border-radius:var(--r);color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(126,200,227,.055),rgba(232,146,124,.035));opacity:0;transition:opacity .25s}
.btn:hover{border-color:rgba(126,200,227,.48);box-shadow:0 0 28px rgba(126,200,227,.09);transform:translateY(-1px)}
.btn:hover::before{opacity:1}
.btn:active{transform:translateY(0)}

/* ─ Error ─ */
.err{background:rgba(240,100,100,.08);border:1px solid rgba(240,100,100,.2);border-radius:var(--rs);padding:.7rem 1rem;color:#f08080;font-family:'DM Mono',monospace;font-size:.77rem;display:none}
.err.show{display:block}

/* ─ Results ─ */
.rw{display:none;animation:fu .5s cubic-bezier(.22,1,.36,1)}
.rw.show{display:block}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Mobile-first: une colonne, passe à deux colonnes sur écrans larges */
.rg{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem}
@media(min-width:540px){
  .rg{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
}

.rc{border-radius:var(--rs);padding:1.1rem 1.2rem;overflow:hidden;min-width:0;box-sizing:border-box}
.rc.fo{background:linear-gradient(145deg,rgba(232,146,124,.07),rgba(232,146,124,.025));border:1px solid rgba(232,146,124,.18)}
.rc.fa{background:linear-gradient(145deg,rgba(126,200,227,.07),rgba(126,200,227,.025));border:1px solid rgba(126,200,227,.18)}

/* Sur mobile, chaque carte est horizontale : chiffre à gauche, détails à droite */
.rc-inner{display:flex;gap:1rem;align-items:flex-start}
.rc-left{flex-shrink:0}
.rc-right{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
@media(min-width:540px){
  .rc-inner{flex-direction:column;gap:0}
  .rc-right{margin-top:0}
}

.rtag{font-size:.55rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fo .rtag{color:var(--warm)}
.fa .rtag{color:var(--accent)}

.rnum{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;line-height:1;white-space:nowrap}
.fo .rnum{color:var(--warm2)}
.fa .rnum{color:var(--accent2)}
@media(min-width:540px){
  .rnum{font-size:clamp(2rem,4vw,3rem)}
}

.runit{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:300;color:var(--text3);margin:.05rem 0 0}

.rrows{border-top:1px solid var(--border);padding-top:.6rem;display:flex;flex-direction:column;gap:.26rem;margin-top:.6rem}
@media(max-width:539px){
  .rrows{border-top:none;padding-top:0;margin-top:.2rem}
}
.rrow{display:flex;justify-content:space-between;align-items:baseline;font-size:.68rem;color:var(--text2);gap:.4rem}
.rrow span:first-child{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1}
.rrow strong{font-family:'DM Mono',monospace;font-weight:400;font-size:.72rem;color:var(--text);flex-shrink:0;white-space:nowrap}
.ev{font-family:'DM Mono',monospace;font-weight:500;color:var(--success);font-size:.72rem;flex-shrink:0;white-space:nowrap}

/* ─ Summary ─ */
.sum{background:var(--card-alt);border:1px solid var(--border);border-radius:var(--rs);padding:1.2rem 1.5rem}
.sumh{font-size:.59rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:.95rem}
.sumg{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:.75rem}
.si{font-size:.68rem;color:var(--text3);line-height:1.7}
.si strong{display:block;font-family:'DM Mono',monospace;font-size:.77rem;font-weight:400;color:var(--text)}

/* ─ Faible display ─ */
.faible-display{background:var(--inp);border:1px solid var(--border);border-radius:var(--rs);color:var(--accent2);font-family:'DM Mono',monospace;font-size:.85rem;font-weight:400;padding:.55rem .9rem;width:100%;min-height:2.35rem;display:flex;align-items:center}
.faible-display.has-val{border-color:rgba(126,200,227,.3)}

/* ─ Tooltip ─ */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:.3rem}
.tip-icon{width:13px;height:13px;border-radius:50%;border:1px solid var(--text3);color:var(--text3);font-size:.6rem;font-family:'DM Mono',monospace;display:inline-flex;align-items:center;justify-content:center;cursor:default;flex-shrink:0;line-height:1;user-select:none}
.tip-icon:hover{border-color:var(--accent);color:var(--accent)}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0e1420;border:1px solid var(--border-s);border-radius:6px;padding:.45rem .7rem;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:400;color:var(--text2);white-space:normal;max-width:220px;text-align:center;pointer-events:none;opacity:0;transition:opacity .18s;z-index:99;letter-spacing:0;text-transform:none}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0e1420}
.tip-icon:hover + .tip-box,.tip-wrap:hover .tip-box{opacity:1}
.tip-box.visible{opacity:1}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:2px}


/* ─ Arbitrage ─ */
.arb-btn{margin-top:1rem;width:100%;padding:.6rem 1rem;background:transparent;border:1px solid var(--border-s);border-radius:var(--rs);color:var(--text3);font-family:'DM Mono',monospace;font-size:.68rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.arb-btn:hover{border-color:var(--accent);color:var(--accent)}
.arb-btn .arb-chevron{transition:transform .22s;font-style:normal}
.arb-btn.open .arb-chevron{transform:rotate(180deg)}
.arb-panel{display:none;margin-top:.75rem;animation:fu .3s cubic-bezier(.22,1,.36,1)}
.arb-panel.show{display:block}
.arb-grid{display:flex;flex-direction:column;gap:.35rem}
.arb-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem .85rem;border:1px solid var(--border);border-radius:var(--rs);background:var(--card-alt)}
.arb-row.best{border-color:var(--success)}
.arb-row.arb-muted{opacity:.28;border-color:transparent}
.arb-sz{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:500;color:var(--text)}
.arb-lbl{font-size:.55rem;color:var(--text3);letter-spacing:.07em}
.arb-delta{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;color:var(--text2)}
.arb-even-btn{margin-top:.45rem;margin-bottom:.6rem;width:100%;padding:.4rem .8rem;background:transparent;border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);font-family:'DM Mono',monospace;font-size:.62rem;font-weight:400;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .22s}
.arb-even-btn:hover{border-color:var(--border-s);color:var(--text2)}
.arb-even-btn.active{border-color:rgba(126,200,227,.4);color:var(--accent2);background:rgba(126,200,227,.06)}

/* ─ Mobile layout ─ */
@media(max-width:480px){
  .wrap{padding:0 .9rem 4rem}
  .card{padding:1.2rem 1.1rem}
  .hub-side{padding:.85rem .8rem}
  .sum{padding:1rem 1.1rem}
  .sumg{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}
</style>
</head>
<body>

<header>
 <svg class="logo-ring" viewBox="0 0 50 50" fill="none">
   <circle cx="25" cy="25" r="22" stroke="rgba(126,200,227,.55)" stroke-width="1.5" stroke-dasharray="3.5 3"/>
   <circle cx="25" cy="25" r="3" fill="rgba(126,200,227,.75)"/>
   <line x1="25" y1="3"  x2="25" y2="11" stroke="rgba(126,200,227,.5)" stroke-width="1.2"/>
   <line x1="25" y1="39" x2="25" y2="47" stroke="rgba(126,200,227,.5)" stroke-width="1.2"/>
   <line x1="3"  y1="25" x2="11" y2="25" stroke="rgba(232,146,124,.5)" stroke-width="1.2"/>
   <line x1="39" y1="25" x2="47" y2="25" stroke="rgba(232,146,124,.5)" stroke-width="1.2"/>
   <line x1="8.5" y1="8.5"  x2="14.5" y2="14.5" stroke="rgba(126,200,227,.3)" stroke-width="1"/>
   <line x1="35.5" y1="35.5" x2="41.5" y2="41.5" stroke="rgba(126,200,227,.3)" stroke-width="1"/>
   <line x1="41.5" y1="8.5"  x2="35.5" y2="14.5" stroke="rgba(232,146,124,.3)" stroke-width="1"/>
   <line x1="14.5" y1="35.5" x2="8.5"  y2="41.5" stroke="rgba(232,146,124,.3)" stroke-width="1"/>
 </svg>
 <div class="brand">Spoke <em>It</em></div>
 <div class="sub">
   by
   <a href="https://www.instagram.com/Docfab21" target="_blank" rel="noopener noreferrer" class="insta-link">
     <svg class="insta-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Instagram">
       <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="currentColor" stroke-width="1.5"/>
       <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.5"/>
       <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
     </svg>
     @Docfab21
   </a>
 </div>
 <div class="hline"></div>
 <button id="lang-btn" onclick="toggleLang()" class="lang-btn">EN</button>
</header>

<div class="wrap">

 <!-- Wheel type -->
 <div class="card">
   <div class="ch"><div class="cdot"></div><div class="clabel" data-i18n="wheelType">Type de roue</div></div>
   <div class="seg">
     <button class="sb active c" id="btn-avant"   onclick="setWheel('avant')" data-i18n="frontWheel">Roue Avant</button>
     <button class="sb w"        id="btn-arriere" onclick="setWheel('arriere')" data-i18n="rearWheel">Roue Arrière</button>
   </div>
 </div>

 <!-- Hub -->
 <div class="card">
   <div class="ch"><div class="cdot"></div><div class="clabel" data-i18n="hub">Moyeu</div><div style="margin-left:auto;display:flex;gap:.3rem"><button class="pill active" id="btn-hub-jbend" onclick="setHubType('jbend')" style="padding:.18rem .65rem;font-size:.65rem">J-bend</button><button class="pill" id="btn-hub-sp" onclick="setHubType('straightpull')" style="padding:.18rem .65rem;font-size:.65rem">Straightpull</button></div></div>

   <div class="hub-top">
     <div class="f">
       <label data-i18n="totalSpokes">Nb total de rayons</label>
       <select id="nb-rayons">
         <option value="" disabled selected data-i18n-opt="choose">— Choisir —</option>
         <option>16</option><option>20</option><option>24</option>
         <option>28</option><option>32</option><option>36</option>
       </select>
     </div>
     <div class="f" id="field-diam-trou">
       <label data-i18n="holeDiam">Ø trous de bride (mm)</label>
       <input type="number" id="diam-trou" value="2.55" step="0.05" min="1" max="5">
     </div>
   </div>

   <div class="hub-sides">
     <div class="hub-side">
       <div class="plabel L"><div class="pdot"></div><span data-i18n="left">Gauche</span></div>
       <div class="f">
         <label class="tip-wrap">PCD (mm)<span class="tip-icon">?</span><span class="tip-box" data-i18n="pcdTip">Diam utile flasque</span></label>
         <input type="number" id="pcd-left" step="0.1">
       </div>
       <div class="f">
         <label class="tip-wrap"><span data-i18n="offset">Déport</span> (mm)<span class="tip-icon">?</span><span class="tip-box" data-i18n="offsetTip">Centre vers flasque</span></label>
         <input type="number" id="offset-left" step="0.1" oninput="onTension()" onkeydown="if(event.key==='-')event.preventDefault()">
       </div>
       <div class="f" id="field-sp-so-left" style="display:none">
         <label class="tip-wrap"><span data-i18n="soLeft">SO gauche</span> (mm)<span class="tip-icon">?</span><span class="tip-box">Spoke Offset</span></label>
         <input type="number" id="sp-so-left" value="0" step="0.1" min="0" max="5">
       </div>
     </div>
     <div class="hub-divider"></div>
     <div class="hub-side">
       <div class="plabel R"><div class="pdot"></div><span data-i18n="right">Droit</span></div>
       <div class="f">
         <label class="tip-wrap">PCD (mm)<span class="tip-icon">?</span><span class="tip-box" data-i18n="pcdTip">Diam utile flasque</span></label>
         <input type="number" id="pcd-right" step="0.1">
       </div>
       <div class="f">
         <label class="tip-wrap"><span data-i18n="offset">Déport</span> (mm)<span class="tip-icon">?</span><span class="tip-box" data-i18n="offsetTip">Centre vers flasque</span></label>
         <input type="number" id="offset-right" step="0.1" oninput="onTension()" onkeydown="if(event.key==='-')event.preventDefault()">
       </div>

function t(key){ return (i18n[lang] && i18n[lang][key]) || key; }

function applyLang(){
  // Static elements via data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Choose option
  document.querySelectorAll('[data-i18n-opt="choose"]').forEach(el => {
    el.textContent = t('choose');
  });
  // Lang button label: show the OTHER language
  document.getElementById('lang-btn').textContent = lang === 'fr' ? 'EN' : 'FR';
  // Refresh tension faible hint if needed
  const disp = document.getElementById('tension-faible-display');
  if(disp && !disp.classList.contains('has-val')){
    const oL = parseFloat(document.getElementById('offset-left').value);
    const oR = parseFloat(document.getElementById('offset-right').value);
    if(isNaN(oL)||isNaN(oR)||oL===0||oR===0){
      disp.innerHTML = t('tensionFaibleHint') ? `<span style="color:var(--text3);font-size:.78rem">${t('tensionFaibleHint')}</span>` : '';
    }
  }
  // Refresh result card labels if results are visible
  if(document.getElementById('results').classList.contains('show')){
    const oL = parseFloat(document.getElementById('offset-left').value);
    const oR = parseFloat(document.getElementById('offset-right').value);
    const asym = parseFloat(document.getElementById('asym').value)||0;
    const asymSign = wtype === 'arriere' ? -1 : 1;
    const effL = oL + asymSign*asym, effR = oR - asymSign*asym;
    const isSymmetric = Math.abs(effL - effR) < 0.01;
    document.getElementById('rtag-fo').textContent = isSymmetric ? t('leftSide')  : t('driveSide');
    document.getElementById('rtag-fa').textContent = isSymmetric ? t('rightSide') : t('nonDriveSide');
    renderResults();
    if (arbData.fo) renderArb('fo');
    if (arbData.fa) renderArb('fa');
  }
}

function toggleLang(){
  lang = lang === 'fr' ? 'en' : 'fr';
  applyLang();
}

// ── State ──────────────────────────────────────────────────────────────────
let wtype='avant', erdMode='direct', sd=2.0, sa=null, cross=3, hubType='jbend';

// Per-wheel saved state (null = never saved)
const saved = { avant: null, arriere: null };

// ── Helpers: read/write all form fields ───────────────────────────────────
function readState(){
 return {
   nbRayons:    document.getElementById('nb-rayons').value,
   diamTrou:    document.getElementById('diam-trou').value,
   pcdLeft:     document.getElementById('pcd-left').value,
   offsetLeft:  document.getElementById('offset-left').value,
   pcdRight:    document.getElementById('pcd-right').value,
   offsetRight: document.getElementById('offset-right').value,
   erdMode:     erdMode,
   erdDirect:   document.getElementById('erd-direct').value,
   nsdVal:      document.getElementById('nsd-val').value,
   ecrouType:   document.getElementById('ecrou-type').value,
   erdNsdResult:document.getElementById('erd-nsd-result').value,
   asym:        document.getElementById('asym').value,
   spokeSelect: document.getElementById('spoke-select').value,
   cross:       cross,
   hubType:     hubType,
   spSoLeft:    document.getElementById('sp-so-left').value,
   spSoRight:   document.getElementById('sp-so-right').value,
   tensionForte:document.getElementById('tension-forte').value,
   sd: sd, sa: sa,
   hasResult:   document.getElementById('results').classList.contains('show'),
   rFo:         document.getElementById('r-fo').textContent,
   rFa:         document.getElementById('r-fa').textContent,
   mFo:         document.getElementById('m-fo').innerHTML,
   mFa:         document.getElementById('m-fa').innerHTML,
   summary:     document.getElementById('summary').innerHTML,
   rtagFo:      document.getElementById('rtag-fo').textContent,
   rtagFa:      document.getElementById('rtag-fa').textContent,
 };
}

function applyState(s){
 if(!s) return;
 document.getElementById('nb-rayons').value    = s.nbRayons;
 document.getElementById('diam-trou').value    = s.diamTrou;
 document.getElementById('pcd-left').value     = s.pcdLeft;
 document.getElementById('offset-left').value  = s.offsetLeft;
 document.getElementById('pcd-right').value    = s.pcdRight;
 document.getElementById('offset-right').value = s.offsetRight;
 document.getElementById('erd-direct').value   = s.erdDirect;
 document.getElementById('nsd-val').value      = s.nsdVal;
 document.getElementById('ecrou-type').value   = s.ecrouType;
 document.getElementById('erd-nsd-result').value = s.erdNsdResult;
 document.getElementById('asym').value         = s.asym;
 document.getElementById('spoke-select').value = s.spokeSelect;
 document.getElementById('tension-forte').value= s.tensionForte;
 sd = s.sd; sa = s.sa; cross = s.cross;
 if(s.hubType){hubType=s.hubType;setHubType(hubType);}
 if(s.spSoLeft!==undefined) document.getElementById('sp-so-left').value=s.spSoLeft;
 if(s.spSoRight!==undefined) document.getElementById('sp-so-right').value=s.spSoRight;

 // ERD mode
 erdMode = s.erdMode;
 document.getElementById('btn-erd-direct').classList.toggle('active', erdMode==='direct');
 document.getElementById('btn-erd-nsd').classList.toggle('active', erdMode==='nsd');
 document.getElementById('erd-direct-section').style.display = erdMode==='direct' ? '' : 'none';
 document.getElementById('erd-nsd-section').style.display    = erdMode==='nsd'    ? '' : 'none';

 // Cross buttons
 document.querySelectorAll('.cp').forEach(b=>{
   b.classList.toggle('active', parseInt(b.dataset.cross)===cross);
 });

 // Results
 if(s.hasResult){
   document.getElementById('r-fo').textContent = s.rFo;
   document.getElementById('r-fa').textContent = s.rFa;
   document.getElementById('m-fo').innerHTML   = s.mFo;
   document.getElementById('m-fa').innerHTML   = s.mFa;
   document.getElementById('summary').innerHTML= s.summary;
   if(s.rtagFo) document.getElementById('rtag-fo').textContent = s.rtagFo;
   if(s.rtagFa) document.getElementById('rtag-fa').textContent = s.rtagFa;
   document.getElementById('results').classList.add('show');
 } else {
   document.getElementById('results').classList.remove('show');
 }

 onTension();
 reorderTensionFields(wtype);
}

function clearForm(){
 ['nb-rayons','pcd-left','offset-left','pcd-right','offset-right',
  'erd-direct','nsd-val','erd-nsd-result','tension-forte'].forEach(id=>{
   document.getElementById(id).value='';
 });
 document.getElementById('diam-trou').value = '2.55';
 document.getElementById('asym').value = '0';
 document.getElementById('ecrou-type').value = '';
 document.getElementById('spoke-select').value = '2.0|';
 sd=2.0; sa=null; cross=3; hubType='jbend'; setHubType('jbend');

 erdMode='direct';
 document.getElementById('btn-erd-direct').classList.add('active');
 document.getElementById('btn-erd-nsd').classList.remove('active');
 document.getElementById('erd-direct-section').style.display='';
 document.getElementById('erd-nsd-section').style.display='none';

 document.querySelectorAll('.cp').forEach(b=>{
   b.classList.toggle('active', parseInt(b.dataset.cross)===3);
 });

 document.getElementById('results').classList.remove('show');
 document.getElementById('err').classList.remove('show');
 const disp=document.getElementById('tension-faible-display');
 disp.textContent='—'; disp.classList.remove('has-val');
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTo(wh){
 if(wh === wtype) return;

 // Save current tab
 saved[wtype] = readState();
 saved[wtype].wtype = wtype;

 // Switch
 wtype = wh;
 document.getElementById('btn-avant').classList.toggle('active', wh==='avant');
 document.getElementById('btn-arriere').classList.toggle('active', wh==='arriere');

 if(saved[wh]){
   applyState(saved[wh]);
 } else {
   clearForm();
 }
}

function reorderTensionFields(wh){
 const g2 = document.getElementById('tension-g2');
 const fo = document.getElementById('tension-forte-field');
 const fa = document.getElementById('tension-faible-field');
 if(wh === 'arriere'){
   g2.appendChild(fo);
 } else {
   g2.insertBefore(fo, fa);
 }
}

function setWheel(wh){
 switchTo(wh);
 reorderTensionFields(wh);
}

// ── Tooltip touch support (iOS) ────────────────────────────────────────────
(function(){
 let current = null;
 function closeAll(){
   document.querySelectorAll('.tip-box.visible').forEach(b=>b.classList.remove('visible'));
   current = null;
 }
 document.addEventListener('touchstart', function(e){
   const icon = e.target.closest('.tip-icon');
   if(icon){
     e.preventDefault();
     const box = icon.nextElementSibling;
     if(box && box.classList.contains('tip-box')){
       if(current === box){ closeAll(); return; }
       closeAll();
       box.classList.add('visible');
       current = box;
     }
   } else if(!e.target.closest('.tip-box')){
     closeAll();
   }
 }, {passive:false});
})();

// ── ERD mode ───────────────────────────────────────────────────────────────
function setErdMode(m){
 erdMode=m;
 document.getElementById('btn-erd-direct').classList.toggle('active',m==='direct');
 document.getElementById('btn-erd-nsd').classList.toggle('active',m==='nsd');
 document.getElementById('erd-direct-section').style.display=m==='direct'?'':'none';
 document.getElementById('erd-nsd-section').style.display=m==='nsd'?'':'none';
}

function setHubType(htype){
 hubType=htype;
 document.getElementById('btn-hub-jbend').classList.toggle('active',htype==='jbend');
 document.getElementById('btn-hub-sp').classList.toggle('active',htype==='straightpull');
 document.getElementById('field-diam-trou').style.display=htype==='jbend'?'':'none';
 document.getElementById('field-sp-so-left').style.display=htype==='straightpull'?'':'none';
 document.getElementById('field-sp-so-right').style.display=htype==='straightpull'?'':'none';
}

function calcNsd(){
 const n=parseFloat(document.getElementById('nsd-val').value);
 const addon=parseFloat(document.getElementById('ecrou-type').value);
 if(!isNaN(n) && !isNaN(addon)) document.getElementById('erd-nsd-result').value=(n+2*addon).toFixed(2);
}

function setSpokeFromSelect(sel){
 const parts = sel.value.split('|');
 sd = parseFloat(parts[0]);
 sa = parts[1] ? parseFloat(parts[1]) : null;
}

function setCross(b){
 document.querySelectorAll('.cp').forEach(x=>x.classList.remove('active'));
 b.classList.add('active');
 cross=parseInt(b.dataset.cross);
}

function onTension(){
 const oL=parseFloat(document.getElementById('offset-left').value);
 const oR=parseFloat(document.getElementById('offset-right').value);
 const tF=parseFloat(document.getElementById('tension-forte').value);
 const disp=document.getElementById('tension-faible-display');
 const field=document.getElementById('tension-faible-field');

 if(isNaN(tF)){disp.textContent='—';disp.classList.remove('has-val');field.style.opacity='.38';return}

 field.style.opacity='1';

 if(isNaN(oL)||isNaN(oR)||oL===0||oR===0){
   disp.innerHTML=t('tensionFaibleHint') ? `<span style="color:var(--text3);font-size:.78rem">${t('tensionFaibleHint')}</span>` : '';
   disp.classList.remove('has-val');
   return;
 }

 const asym=parseFloat(document.getElementById('asym').value)||0;
 const asymSign = wtype === 'arriere' ? -1 : 1;
 const effL = oL + asymSign*asym, effR = oR - asymSign*asym;
 const foOff = Math.min(effL, effR);
 const faOff = Math.max(effL, effR);
 const ratio = (faOff>0 && foOff>0) ? foOff/faOff : 1;
 const exact = tF * ratio;
 disp.textContent=exact.toFixed(1);
 disp.classList.add('has-val');
}

function getERD(){
 return erdMode==='direct'
   ?parseFloat(document.getElementById('erd-direct').value)
   :parseFloat(document.getElementById('erd-nsd-result').value);
}

function slen(pcd,off,cr,n,erd,trou){
 const R=pcd/2, Rj=erd/2, a=cr*(2*Math.PI)/(n/2);
 return Math.sqrt(R*R+Rj*Rj-2*R*Rj*Math.cos(a)+off*off)-trou/2;
}

function slenSP(pcd,off,cr,n,erd,so){
 // H1 : θ = 2π×(cr+0.5)/(n/2)
 // L = √( (R·sinθ)² + (ERD/2 − R·cosθ)² + W² ) + SO
 const R=pcd/2, Rj=erd/2;
 const theta=cr===0?0:(cr+0.5)*(2*Math.PI)/(n/2);
 const sinT=Math.sin(theta),cosT=Math.cos(theta);
 return Math.sqrt((R*sinT)*(R*sinT)+(Rj-R*cosT)*(Rj-R*cosT)+off*off)+so;
}

function area(){
 const a = (sa !== null && !isNaN(sa)) ? sa : sd;
 return Math.PI/4*sd*a;
}

function el(F,L){return(F*9.81*L)/(area()*210000)}


var arbData  = { fo: null, fa: null };
var lastCalc = null;
var evenMode = { fo: false, fa: false };

function buildArb(side, exactLen, elongation) {
  arbData[side] = { exactLen: exactLen, elongation: elongation };
  renderArb(side);
}

function renderArb(side) {
  var exactLen   = arbData[side].exactLen;
  var elongation = arbData[side].elongation;
  var onlyEven   = evenMode[side];
  var base       = Math.floor(exactLen);
  var sizes      = [base - 1, base, base + 1];
  var grid       = document.getElementById('arb-grid-' + side);
  var deltas     = [];
  for (var i = 0; i < sizes.length; i++) {
    deltas.push((sizes[i] + elongation) - exactLen);
  }
  var minAbs = Infinity;
  for (var i = 0; i < sizes.length; i++) {
    if (onlyEven && sizes[i] % 2 !== 0) continue;
    if (Math.abs(deltas[i]) < minAbs) minAbs = Math.abs(deltas[i]);
  }
  var html = '';
  for (var i = 0; i < sizes.length; i++) {
    var sz    = sizes[i];
    var delta = deltas[i];
    var sign  = delta >= 0 ? '+' : '';
    var isOdd = sz % 2 !== 0;
    var rowCls = 'arb-row';
    if (onlyEven && isOdd) {
      rowCls += ' arb-muted';
    } else if (Math.abs(delta) <= minAbs + 0.0001) {
      rowCls += ' best';
    }
    html += '<div class="' + rowCls + '">'
          + '<span class="arb-sz">' + sz + ' mm</span>'
          + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:.1rem">'
          + '<span class="arb-delta">' + sign + delta.toFixed(2) + ' mm</span>'
          + '<span class="arb-lbl">' + t('gapTarget') + '</span>'
          + '</div>'
          + '</div>';
  }
  grid.innerHTML = html;
}

function toggleEven(side) {
  evenMode[side] = !evenMode[side];
  document.getElementById('arb-even-' + side).classList.toggle('active', evenMode[side]);
  renderArb(side);
}

function toggleArb(side) {
  var btn   = document.getElementById('arb-btn-' + side);
  var panel = document.getElementById('arb-panel-' + side);
  var open  = panel.classList.contains('show');
  panel.classList.toggle('show', !open);
  btn.classList.toggle('open', !open);
}
function renderResults() {
  if (!lastCalc) return;
  var c = lastCalc;
  document.getElementById('m-fo').innerHTML =
    '<div class="rrow"><span>' + t('allongement') + '</span><span class="ev">+' + c.eFo.toFixed(2) + ' mm</span></div>' +
    '<div class="rrow"><strong>' + c.tF + ' kgf</strong></div>';
  document.getElementById('m-fa').innerHTML =
    '<div class="rrow"><span>' + t('allongement') + '</span><span class="ev">+' + c.eFa.toFixed(2) + ' mm</span></div>' +
    '<div class="rrow"><strong>' + c.tf.toFixed(1) + ' kgf</strong></div>';
  var cl = c.crossVal === 0 ? t('radial') : (c.crossVal + '×');
  document.getElementById('summary').innerHTML =
    '<div class="sumh">' + t('configSummary') + '</div>' +
    '<div class="sumg">' +
    '<div class="si">ERD<strong>' + c.erd.toFixed(1) + ' mm</strong></div>' +
    '<div class="si">' + t('wheelLabel') + '<strong>' + (c.wtype === 'avant' ? t('frontLabel') : t('rearLabel')) + '</strong></div>' +
    '<div class="si">' + t('spokeCount') + '<strong>' + c.n + ' (' + c.h + t('perSide') + ')</strong></div>' +
    '<div class="si">' + t('crossLabel') + '<strong>' + cl + '</strong></div>' +
    '<div class="si">' + t('hubType') + '<strong>' + (c.isSP ? 'Straightpull' : 'J-Bend') + '</strong></div>' +
    '<div class="si">' + t('spokeSection2') + '<strong>' + c.sl + '</strong></div>' +
    '<div class="si">' + t('rimAsym2') + '<strong>' + (c.asym > 0 ? '+' : '') + c.asym + ' mm</strong></div>' +
    '<div class="si">' + t('tensionRatio') + '<strong style="color:' + (c.ratio >= 0.7 ? 'var(--success)' : c.ratio >= 0.6 ? '#e8a040' : '#e06060') + '">' + (c.ratio * 100).toFixed(1) + '%</strong></div>' +
    '</div>';
}

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}

function playValidation(){
 try {
   const ctx = new (window.AudioContext || window.webkitAudioContext)();
   const t = ctx.currentTime;
   [0, 0.12].forEach((delay, i) => {
     const osc = ctx.createOscillator();
     const gain = ctx.createGain();
     osc.connect(gain); gain.connect(ctx.destination);
     osc.type = 'sine';
     osc.frequency.setValueAtTime(i === 0 ? 660 : 880, t + delay);
     gain.gain.setValueAtTime(0, t + delay);
     gain.gain.linearRampToValueAtTime(0.18, t + delay + 0.02);
     gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.35);
     osc.start(t + delay);
     osc.stop(t + delay + 0.4);
   });
 } catch(e) {}
}

function calc(){
 const e=document.getElementById('err');e.classList.remove('show');

 const n=parseInt(document.getElementById('nb-rayons').value);
 if(!n) return showErr(t('errSpokes'));

 const pL=parseFloat(document.getElementById('pcd-left').value);
 const pR=parseFloat(document.getElementById('pcd-right').value);
 const oL=parseFloat(document.getElementById('offset-left').value);
 const oR=parseFloat(document.getElementById('offset-right').value);
 if([pL,pR,oL,oR].some(isNaN)) return showErr(t('errPcd'));
 if(pL<=0||pR<=0) return showErr(t('errPcd'));

 const erd=getERD();
 if(isNaN(erd)||erd<=0) return showErr(t('errErd'));

 const asym=parseFloat(document.getElementById('asym').value)||0;
 const isSP=hubType==='straightpull';
 const trou=parseFloat(document.getElementById('diam-trou').value)||2.55;
 const soL=parseFloat(document.getElementById('sp-so-left').value)||0;
 const soR=parseFloat(document.getElementById('sp-so-right').value)||0;
 const tF=parseFloat(document.getElementById('tension-forte').value);
 if(isNaN(tF)) return showErr(t('errTension'));

 // Roue arrière : asym vers droite (nappe forte), roue avant : vers gauche
 const asymSign = wtype === 'arriere' ? -1 : 1;
 const effL=oL + asymSign*asym, effR=oR - asymSign*asym;

 if(effL<=0||effR<=0) return showErr(t('errOffset'));

 let foOff,faOff,foPCD,faPCD;
 // Forte = cote avec le plus petit deport (plus tendu)
 if(effL<=effR){foOff=effL;faOff=effR;foPCD=pL;faPCD=pR}
 else{foOff=effR;faOff=effL;foPCD=pR;faPCD=pL}

 const ratio=(faOff>0&&foOff>0)?foOff/faOff:1;
 const tf=tF*ratio;

 const soFo=isSP?(effL<=effR?soL:soR):0;
 const soFa=isSP?(effL<=effR?soR:soL):0;
 const Lfo=isSP?slenSP(foPCD,foOff,cross,n,erd,soFo):slen(foPCD,foOff,cross,n,erd,trou);
 const Lfa=isSP?slenSP(faPCD,faOff,cross,n,erd,soFa):slen(faPCD,faOff,cross,n,erd,trou);
 const eFo=el(tF,Lfo), eFa=el(tf,Lfa);
 const h=n/2;
 lastCalc={tF,tf,Lfo,Lfa,eFo,eFa,h,erd,n,isSP,sl:sa?`${sd}×${sa} mm`:`${sd} mm`,crossVal:cross,asym,ratio,wtype};

 document.getElementById('r-fo').textContent=Lfo.toFixed(2);
 document.getElementById('r-fa').textContent=Lfa.toFixed(2);

 renderResults();

 // Auto-save current wheel state after calc
 saved[wtype] = readState();
 saved[wtype].wtype = wtype;

 playValidation();
 // Reorder result cards: nappe forte à droite pour roue arrière, à gauche pour avant
 const rg = document.querySelector('.rg');
 const rcFo = document.querySelector('.rc.fo');
 const rcFa = document.querySelector('.rc.fa');
 if(wtype === 'arriere'){
   // forte à droite : fa | fo
   rg.appendChild(rcFo); // déplace fo après fa
 } else {
   // forte à gauche : fo | fa
   rg.insertBefore(rcFo, rcFa);
 }

 // Labels: si moyeu symétrique, afficher Gauche/Droite plutôt que Forte/Faible
 const isSymmetric = Math.abs(effL - effR) < 0.01;
 if(isSymmetric){
   document.getElementById('rtag-fo').textContent = t('leftSide');
   document.getElementById('rtag-fa').textContent = t('rightSide');
 } else {
   document.getElementById('rtag-fo').textContent = t('driveSide');
   document.getElementById('rtag-fa').textContent = t('nonDriveSide');
 }

 evenMode.fo = false; evenMode.fa = false;
 document.getElementById('arb-even-fo').classList.remove('active');
 document.getElementById('arb-even-fa').classList.remove('active');
 document.getElementById('arb-btn-fo').style.display = '';
 document.getElementById('arb-btn-fa').style.display = '';
 document.getElementById('arb-panel-fo').classList.remove('show');
 document.getElementById('arb-btn-fo').classList.remove('open');
 document.getElementById('arb-panel-fa').classList.remove('show');
 document.getElementById('arb-btn-fa').classList.remove('open');
 buildArb('fo', Lfo, eFo);
 buildArb('fa', Lfa, eFa);
 document.getElementById('results').classList.add('show');
 setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}),80);
}
</script>
