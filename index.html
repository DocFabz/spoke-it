  <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoke It</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
 --bg:       #181c24;
 --bg2:      #1e2330;
 --card:     #232a38;
 --card-alt: #1a2030;
 --border:   rgba(255,255,255,0.07);
 --border-s: rgba(255,255,255,0.13);
 --accent:   #7ec8e3;
 --accent2:  #a8d8ea;
 --warm:     #e8927c;
 --warm2:    #f0b49a;
 --success:  #7ecfa8;
 --text:     #dce4ed;
 --text2:    #9aaabb;
 --text3:    #596778;
 --inp:      #161b27;
 --r:        14px;
 --rs:       9px;
 --sh:       0 4px 24px rgba(0,0,0,0.32);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
 background:var(--bg);
 color:var(--text);
 font-family:'DM Sans',sans-serif;
 font-weight:400;
 min-height:100vh;
 line-height:1.55;
 background-image:
   radial-gradient(ellipse 60% 40% at 15% 5%, rgba(126,200,227,.055) 0%,transparent 70%),
   radial-gradient(ellipse 50% 35% at 85% 95%,rgba(232,146,124,.04)  0%,transparent 70%);
}

/* ─ Header ─ */
header{text-align:center;padding:3.5rem 1rem 2rem}
.logo-ring{display:inline-block;width:50px;height:50px;margin-bottom:1.1rem;opacity:.5;animation:spin 20s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--text)}
.brand em{font-style:normal;color:var(--accent)}
.sub{font-family:'DM Mono',monospace;font-size:.67rem;font-weight:300;color:var(--text3);letter-spacing:.2em;margin-top:.45rem}
.hline{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1.3rem auto 0}

/* ─ Layout ─ */
.wrap{max-width:880px;margin:0 auto;padding:0 1.2rem 4rem;display:flex;flex-direction:column;gap:1rem}

/* ─ Card ─ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem 1.8rem;box-shadow:var(--sh);transition:border-color .3s}
.card:hover{border-color:var(--border-s)}
.ch{display:flex;align-items:center;gap:.5rem;margin-bottom:1.35rem}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.55;flex-shrink:0}
.clabel{font-size:.63rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}

/* ─ Seg ─ */
.seg{display:flex;background:var(--inp);border:1px solid var(--border);border-radius:var(--rs);padding:3px;gap:3px}
.sb{flex:1;padding:.6rem 1rem;border:none;border-radius:calc(var(--rs) - 2px);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .22s}
.sb.active{background:var(--card-alt);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.28)}
.sb.active.w{color:var(--warm2)}
.sb.active.c{color:var(--accent2)}

/* ─ Grid ─ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr 1fr}.hub-top{grid-template-columns:1fr 1fr}}

/* ─ Fields ─ */
.f{display:flex;flex-direction:column;gap:.35rem}
label{font-size:.67rem;font-weight:500;letter-spacing:.07em;color:var(--text3);text-transform:uppercase}
input[type=number],select{background:var(--inp);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;font-weight:300;padding:.55rem .9rem;width:100%;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:rgba(126,200,227,.4);background:rgba(126,200,227,.025)}
input::placeholder{color:var(--text3);opacity:1}
select option{background:#161b27}

/* ─ Panel ─ */
.plabel{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:.38rem}
.plabel.L{color:var(--accent)}
.plabel.R{color:var(--warm)}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.L .pdot{background:var(--accent)}
.R .pdot{background:var(--warm)}

/* Hub top row */
.hub-top{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}

/* Hub sides: two columns always, separated by a thin line */
.hub-sides{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;background:var(--card-alt);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.hub-side{padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:.75rem}
.hub-divider{background:var(--border);width:1px;margin:0}

/* ─ Pills ─ */
.prow{display:flex;gap:.38rem;margin-bottom:1.1rem}
.pill{padding:.28rem .85rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .2s}
.pill.active{border-color:rgba(126,200,227,.4);color:var(--accent2);background:rgba(126,200,227,.07)}

.sprow{display:flex;flex-wrap:wrap;gap:.32rem}
.sp{padding:.28rem .75rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:.7rem;font-weight:300;cursor:pointer;transition:all .2s;white-space:nowrap}
.sp.active{border-color:rgba(232,146,124,.45);color:var(--warm2);background:rgba(232,146,124,.07)}

.crow{display:flex;gap:.38rem}
.cp{flex:1;padding:.48rem;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.cp.active{border-color:rgba(126,200,227,.4);color:var(--accent2);background:rgba(126,200,227,.07)}

/* ─ Misc ─ */
.div{height:1px;background:var(--border);margin:1.15rem 0}
.help{font-size:.66rem;color:var(--text3);margin-top:.22rem;font-style:italic;line-height:1.4}

.sync{display:inline-flex;align-items:center;gap:.25rem;font-family:'DM Mono',monospace;font-size:.61rem;color:var(--success);opacity:0;transition:opacity .4s;margin-left:auto}
.sync.show{opacity:1}

/* ─ Button ─ */
.btn{width:100%;padding:1rem 1.5rem;background:var(--card);border:1px solid rgba(126,200,227,.22);border-radius:var(--r);color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(126,200,227,.055),rgba(232,146,124,.035));opacity:0;transition:opacity .25s}
.btn:hover{border-color:rgba(126,200,227,.48);box-shadow:0 0 28px rgba(126,200,227,.09);transform:translateY(-1px)}
.btn:hover::before{opacity:1}
.btn:active{transform:translateY(0)}

/* ─ Error ─ */
.err{background:rgba(240,100,100,.08);border:1px solid rgba(240,100,100,.2);border-radius:var(--rs);padding:.7rem 1rem;color:#f08080;font-family:'DM Mono',monospace;font-size:.77rem;display:none}
.err.show{display:block}

/* ─ Results ─ */
.rw{display:none;animation:fu .5s cubic-bezier(.22,1,.36,1)}
.rw.show{display:block}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.rg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}

.rc{border-radius:var(--rs);padding:1.4rem 1.5rem;position:relative;overflow:hidden}
.rc.fo{background:linear-gradient(145deg,rgba(232,146,124,.07),rgba(232,146,124,.025));border:1px solid rgba(232,146,124,.18)}
.rc.fa{background:linear-gradient(145deg,rgba(126,200,227,.07),rgba(126,200,227,.025));border:1px solid rgba(126,200,227,.18)}

.rtag{font-size:.59rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.65rem}
.fo .rtag{color:var(--warm)}
.fa .rtag{color:var(--accent)}

.rnum{font-family:'Cormorant Garamond',serif;font-size:3.1rem;font-weight:300;line-height:1}
.fo .rnum{color:var(--warm2)}
.fa .rnum{color:var(--accent2)}

.runit{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:300;color:var(--text3);margin:.08rem 0 .9rem}

.rrows{border-top:1px solid var(--border);padding-top:.8rem;display:flex;flex-direction:column;gap:.32rem}
.rrow{display:flex;justify-content:space-between;align-items:baseline;font-size:.72rem;color:var(--text2)}
.rrow strong{font-family:'DM Mono',monospace;font-weight:400;font-size:.77rem;color:var(--text)}
.ev{font-family:'DM Mono',monospace;font-weight:500;color:var(--success);font-size:.8rem}

/* ─ Summary ─ */
.sum{background:var(--card-alt);border:1px solid var(--border);border-radius:var(--rs);padding:1.2rem 1.5rem}
.sumh{font-size:.59rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:.95rem}
.sumg{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:.75rem}
.si{font-size:.68rem;color:var(--text3);line-height:1.7}
.si strong{display:block;font-family:'DM Mono',monospace;font-size:.77rem;font-weight:400;color:var(--text)}

/* ─ Faible display ─ */
.faible-display{background:var(--inp);border:1px solid var(--border);border-radius:var(--rs);color:var(--accent2);font-family:'DM Mono',monospace;font-size:.85rem;font-weight:400;padding:.55rem .9rem;width:100%;min-height:2.35rem;display:flex;align-items:center}
.faible-display.has-val{border-color:rgba(126,200,227,.3)}
.faible-display .exact{font-size:.75rem;color:var(--text3);margin-left:.4rem}

/* ─ Tooltip ─ */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:.3rem}
.tip-icon{width:13px;height:13px;border-radius:50%;border:1px solid var(--text3);color:var(--text3);font-size:.6rem;font-family:'DM Mono',monospace;display:inline-flex;align-items:center;justify-content:center;cursor:default;flex-shrink:0;line-height:1;user-select:none}
.tip-icon:hover{border-color:var(--accent);color:var(--accent)}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0e1420;border:1px solid var(--border-s);border-radius:6px;padding:.45rem .7rem;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:400;color:var(--text2);white-space:normal;max-width:220px;text-align:center;pointer-events:none;opacity:0;transition:opacity .18s;z-index:99;letter-spacing:0;text-transform:none}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0e1420}
.tip-icon:hover + .tip-box,.tip-wrap:hover .tip-box{opacity:1}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:2px}

</style>
</head>
<body>

<header>
 <svg class="logo-ring" viewBox="0 0 50 50" fill="none">
   <circle cx="25" cy="25" r="22" stroke="rgba(126,200,227,.55)" stroke-width="1.5" stroke-dasharray="3.5 3"/>
   <circle cx="25" cy="25" r="3" fill="rgba(126,200,227,.75)"/>
   <line x1="25" y1="3"  x2="25" y2="11" stroke="rgba(126,200,227,.5)" stroke-width="1.2"/>
   <line x1="25" y1="39" x2="25" y2="47" stroke="rgba(126,200,227,.5)" stroke-width="1.2"/>
   <line x1="3"  y1="25" x2="11" y2="25" stroke="rgba(232,146,124,.5)" stroke-width="1.2"/>
   <line x1="39" y1="25" x2="47" y2="25" stroke="rgba(232,146,124,.5)" stroke-width="1.2"/>
   <line x1="8.5" y1="8.5"  x2="14.5" y2="14.5" stroke="rgba(126,200,227,.3)" stroke-width="1"/>
   <line x1="35.5" y1="35.5" x2="41.5" y2="41.5" stroke="rgba(126,200,227,.3)" stroke-width="1"/>
   <line x1="41.5" y1="8.5"  x2="35.5" y2="14.5" stroke="rgba(232,146,124,.3)" stroke-width="1"/>
   <line x1="14.5" y1="35.5" x2="8.5"  y2="41.5" stroke="rgba(232,146,124,.3)" stroke-width="1"/>
 </svg>
 <div class="brand">Spoke <em>It</em></div>
 <div class="sub">by @Docfab21</div>
 <div class="hline"></div>
</header>

<div class="wrap">

 <!-- Wheel type -->
 <div class="card">
   <div class="ch"><div class="cdot"></div><div class="clabel">Type de roue</div></div>
   <div class="seg">
     <button class="sb active c" id="btn-avant"   onclick="setWheel('avant')">Roue Avant</button>
     <button class="sb w"        id="btn-arriere" onclick="setWheel('arriere')">Roue Arrière</button>
   </div>
 </div>

 <!-- Hub -->
 <div class="card">
   <div class="ch"><div class="cdot"></div><div class="clabel">Moyeu</div></div>

   <div class="hub-top">
     <div class="f">
       <label>Nb total de rayons</label>
       <select id="nb-rayons">
         <option value="" disabled selected>— Choisir —</option>
         <option>16</option><option>20</option><option>24</option>
         <option>28</option><option>32</option><option>36</option>
       </select>
     </div>
     <div class="f">
       <label>Ø trous de bride (mm)</label>
       <input type="number" id="diam-trou" value="2.55" step="0.05" min="1" max="5">
     </div>
   </div>

   <div class="hub-sides">
     <div class="hub-side">
       <div class="plabel L"><div class="pdot"></div>Gauche</div>
       <div class="f">
         <label class="tip-wrap">PCD (mm)<span class="tip-icon">?</span><span class="tip-box">Diamètre utile flasque G</span></label>
         <input type="number" id="pcd-left" step="0.1">
       </div>
       <div class="f">
         <label class="tip-wrap">Déport (mm)<span class="tip-icon">?</span><span class="tip-box">Centre à flasque G</span></label>
         <input type="number" id="offset-left" step="0.1" oninput="onTension()">
       </div>
     </div>
     <div class="hub-divider"></div>
     <div class="hub-side">
       <div class="plabel R"><div class="pdot"></div>Droit</div>
       <div class="f">
         <label class="tip-wrap">PCD (mm)<span class="tip-icon">?</span><span class="tip-box">Diamètre utile flasque D</span></label>
         <input type="number" id="pcd-right" step="0.1">
       </div>
       <div class="f">
         <label class="tip-wrap">Déport (mm)<span class="tip-icon">?</span><span class="tip-box">Centre à flasque D</span></label>
         <input type="number" id="offset-right" step="0.1" oninput="onTension()">
       </div>
     </div>
   </div>
 </div>

 <!-- Rim -->
 <div class="card">
   <div class="ch"><div class="cdot"></div><div class="clabel">Jante</div></div>

   <div class="prow">
     <button class="pill active" id="btn-erd-direct" onclick="setErdMode('direct')">ERD direct</button>
     <button class="pill"        id="btn-erd-nsd"    onclick="setErdMode('nsd')">NSD + ADDON</button>
   </div>

   <div id="erd-direct-section">
     <div class="f" style="max-width:185px">
       <label>ERD (mm)</label>
       <input type="number" id="erd-direct" step="0.1">
     </div>
   </div>

   <div id="erd-nsd-section" style="display:none">
     <div class="g2" style="max-width:400px">
       <div class="f">
         <label>NSD (mm)</label>
         <input type="number" id="nsd-val" step="0.1" oninput="calcNsd()">
       </div>
       <div class="f">
         <label class="tip-wrap">ADDON (mm)<span class="tip-icon">?</span><span class="tip-box">L'ADDON dépend de l'écrou utilisé. Sélectionner 2 mm pour écrous standards 12 mm.</span></label>
         <select id="ecrou-type" onchange="calcNsd()">
           <option value="" disabled selected>— mm —</option>
           <option value="1.8">1.8</option>
           <option value="1.9">1.9</option>
           <option value="2.0">2.0</option>
           <option value="2.1">2.1</option>
           <option value="2.2">2.2</option>
           <option value="2.3">2.3</option>
           <option value="2.4">2.4</option>
           <option value="2.5">2.5</option>
           <option value="2.6">2.6</option>
           <option value="2.7">2.7</option>
           <option value="2.8">2.8</option>
           <option value="2.9">2.9</option>
           <option value="3.0">3.0</option>
           <option value="3.1">3.1</option>
           <option value="3.2">3.2</option>
           <option value="3.3">3.3</option>
           <option value="3.4">3.4</option>
           <option value="3.5">3.5</option>
           <option value="3.6">3.6</option>
         </select>
       </div>
     </div>
     <div class="f" style="max-width:185px;margin-top:.8rem">
       <label>ERD calculé (mm)</label>
       <input type="number" id="erd-nsd-result" readonly style="opacity:.55;cursor:not-allowed">
     </div>
   </div>

   <div class="div"></div>

   <div class="g2">
     <div class="f">
       <label>Asymétrie jante (mm)</label>
       <input type="number" id="asym" value="0" step="0.5">
       <p class="help">Positif = décalage vers la droite</p>
     </div>
     <div class="f">
       <label>Section de rayon</label>
       <select id="spoke-select" onchange="setSpokeFromSelect(this)">
         <option value="1.6|">1.6 mm</option>
         <option value="1.7|">1.7 mm</option>
         <option value="1.8|">1.8 mm</option>
         <option value="1.9|">1.9 mm</option>
         <option value="2.0|" selected>2.0 mm</option>
         <option value="2.1|">2.1 mm</option>
         <option value="2.2|">2.2 mm</option>
         <option value="2.3|">2.3 mm</option>
         <option value="0.9|2.2">CX-Ray 0.9×2.2</option>
         <option value="0.9|2.3">Aerolite 0.9×2.3</option>
       </select>
     </div>
   </div>

   <div class="div"></div>

   <div class="f">
     <label>Croisement</label>
     <div class="crow">
       <button class="cp"        data-cross="0" onclick="setCross(this)">Radial</button>
       <button class="cp"        data-cross="1" onclick="setCross(this)">1×</button>
       <button class="cp"        data-cross="2" onclick="setCross(this)">2×</button>
       <button class="cp active" data-cross="3" onclick="setCross(this)">3×</button>
       <button class="cp"        data-cross="4" onclick="setCross(this)">4×</button>
     </div>
   </div>
 </div>

 <!-- Tensions -->
 <div class="card">
   <div class="ch">
     <div class="cdot"></div>
     <div class="clabel">Tensions cibles</div>
   </div>
   <div class="g2">
     <div class="f">
       <label>
         <span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--warm);margin-right:.3rem;vertical-align:middle"></span>
         Nappe forte
       </label>
       <select id="tension-forte" onchange="onTension()">
         <option value="" disabled selected>—</option>
         <option>80</option><option>85</option><option>90</option><option>95</option>
         <option>100</option><option>105</option><option>110</option><option>115</option>
         <option>120</option><option>125</option><option>130</option>
       </select>
     </div>
     <div class="f">
       <label>
         <span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--accent);margin-right:.3rem;vertical-align:middle"></span>
         Nappe faible
       </label>
       <div class="faible-display" id="tension-faible-display">—</div>
     </div>
   </div>
   <p class="help" style="margin-top:.6rem">La tension faible est calculée automatiquement selon le ratio des déports.</p>
 </div>

 <div class="err" id="err"></div>
 <button class="btn" onclick="calc()">Calculer les longueurs de rayons</button>

 <!-- Results -->
 <div class="rw" id="results">
   <div class="card" style="border-color:rgba(126,200,227,.13)">
     <div class="ch">
       <div class="cdot" style="background:var(--success);opacity:.7"></div>
       <div class="clabel" style="color:var(--success)">Résultats</div>
     </div>

     <div class="rg">
       <div class="rc fo">
         <div class="rtag">Nappe forte</div>
         <div class="rnum" id="r-fo">—</div>
         <div class="runit">mm</div>
         <div class="rrows" id="m-fo"></div>
       </div>
       <div class="rc fa">
         <div class="rtag">Nappe faible</div>
         <div class="rnum" id="r-fa">—</div>
         <div class="runit">mm</div>
         <div class="rrows" id="m-fa"></div>
       </div>
     </div>

     <div class="sum" id="summary"></div>
   </div>
 </div>

</div>

<script>
let wtype='avant', erdMode='direct', sd=2.0, sa=null, cross=3;

function setWheel(t){
 wtype=t;
 document.getElementById('btn-avant').classList.toggle('active',t==='avant');
 document.getElementById('btn-arriere').classList.toggle('active',t==='arriere');
}

function setErdMode(m){
 erdMode=m;
 document.getElementById('btn-erd-direct').classList.toggle('active',m==='direct');
 document.getElementById('btn-erd-nsd').classList.toggle('active',m==='nsd');
 document.getElementById('erd-direct-section').style.display=m==='direct'?'':'none';
 document.getElementById('erd-nsd-section').style.display=m==='nsd'?'':'none';
}

function calcNsd(){
 const n=parseFloat(document.getElementById('nsd-val').value);
 const addon=parseFloat(document.getElementById('ecrou-type').value);
 if(!isNaN(n) && !isNaN(addon)) document.getElementById('erd-nsd-result').value=(n+addon).toFixed(2);
}

function setSpokeFromSelect(sel){
 const parts = sel.value.split('|');
 sd = parseFloat(parts[0]);
 sa = parts[1] ? parseFloat(parts[1]) : null;
}

function setCross(b){
 document.querySelectorAll('.cp').forEach(x=>x.classList.remove('active'));
 b.classList.add('active');
 cross=parseInt(b.dataset.cross);
}

function onTension(){
 const oL=parseFloat(document.getElementById('offset-left').value);
 const oR=parseFloat(document.getElementById('offset-right').value);
 const tF=parseFloat(document.getElementById('tension-forte').value);
 const disp=document.getElementById('tension-faible-display');

 if(isNaN(tF)){disp.textContent='—';disp.classList.remove('has-val');return}

 if(isNaN(oL)||isNaN(oR)||oL===0||oR===0){
   disp.innerHTML=`<span style="color:var(--text3);font-size:.78rem">Entrez les déports</span>`;
   disp.classList.remove('has-val');
   return;
 }

 const foOff = wtype==='arriere' ? oR : Math.min(oL, oR);
 const faOff = wtype==='arriere' ? oL  : Math.max(oL, oR);
 const ratio = (faOff>0 && foOff>0) ? foOff/faOff : 1;
 const exact = tF * ratio;
 disp.textContent=exact.toFixed(1);
 disp.classList.add('has-val');
}

function getERD(){
 return erdMode==='direct'
   ?parseFloat(document.getElementById('erd-direct').value)
   :parseFloat(document.getElementById('erd-nsd-result').value);
}

function slen(pcd,off,cr,n,erd,trou){
 const R=pcd/2, Rj=erd/2, a=cr*(2*Math.PI)/(n/2);
 return Math.sqrt(R*R+Rj*Rj-2*R*Rj*Math.cos(a)+off*off)-trou/2;
}

function area(){return sa!==null?Math.PI/4*sd*sa:Math.PI/4*sd*sd}

function el(F,L){return(F*9.81*L)/(area()*210000)}

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}

function row(label,val){return`<div class="rrow"><span>${label}</span><strong>${val}</strong></div>`}

function playValidation(){
 try {
   const ctx = new (window.AudioContext || window.webkitAudioContext)();
   const t = ctx.currentTime;
   [0, 0.12].forEach((delay, i) => {
     const osc = ctx.createOscillator();
     const gain = ctx.createGain();
     osc.connect(gain); gain.connect(ctx.destination);
     osc.type = 'sine';
     osc.frequency.setValueAtTime(i === 0 ? 660 : 880, t + delay);
     gain.gain.setValueAtTime(0, t + delay);
     gain.gain.linearRampToValueAtTime(0.18, t + delay + 0.02);
     gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.35);
     osc.start(t + delay);
     osc.stop(t + delay + 0.4);
   });
 } catch(e) {}
}

function calc(){
 const e=document.getElementById('err');e.classList.remove('show');

 const n=parseInt(document.getElementById('nb-rayons').value);
 if(!n) return showErr('Veuillez choisir le nombre de rayons.');

 const pL=parseFloat(document.getElementById('pcd-left').value);
 const pR=parseFloat(document.getElementById('pcd-right').value);
 const oL=parseFloat(document.getElementById('offset-left').value);
 const oR=parseFloat(document.getElementById('offset-right').value);
 if([pL,pR,oL,oR].some(isNaN)) return showErr('Veuillez renseigner PCD et déport pour les deux côtés.');

 const erd=getERD();
 if(isNaN(erd)||erd<=0) return showErr('ERD invalide ou non renseigné.');

 const asym=parseFloat(document.getElementById('asym').value)||0;
 const trou=parseFloat(document.getElementById('diam-trou').value)||2.55;
 const tF=parseFloat(document.getElementById('tension-forte').value);
 if(isNaN(tF)) return showErr('Veuillez choisir la tension cible nappe forte.');

 const effL=oL+asym, effR=oR-asym;
 let foOff,faOff,foPCD,faPCD;
 if(wtype==='arriere'){foOff=effR;faOff=effL;foPCD=pR;faPCD=pL}
 else if(effL<=effR){foOff=effL;faOff=effR;foPCD=pL;faPCD=pR}
 else{foOff=effR;faOff=effL;foPCD=pR;faPCD=pL}

 const ratio=(faOff>0&&foOff>0)?foOff/faOff:1;
 const tf=tF*ratio;

 const Lfo=slen(foPCD,foOff,cross,n,erd,trou);
 const Lfa=slen(faPCD,faOff,cross,n,erd,trou);
 const eFo=el(tF,Lfo), eFa=el(tf,Lfa);
 const h=n/2;
 const ratioDisp=(faOff>0&&foOff>0)?(faOff/foOff).toFixed(3):'—';

 document.getElementById('r-fo').textContent=Lfo.toFixed(1);
 document.getElementById('r-fa').textContent=Lfa.toFixed(1);

 document.getElementById('m-fo').innerHTML=
   `<div class="rrow"><span>Élongation à ${tF} kgf</span><span class="ev">+${eFo.toFixed(3)} mm</span></div>`+
   row('Rayons par côté',h)+
   row('Déport effectif',foOff.toFixed(2)+' mm')+
   row('Tension cible',tF+' kgf');

 document.getElementById('m-fa').innerHTML=
   `<div class="rrow"><span>Élongation à ${tf.toFixed(1)} kgf</span><span class="ev">+${eFa.toFixed(3)} mm</span></div>`+
   row('Rayons par côté',h)+
   row('Déport effectif',faOff.toFixed(2)+' mm')+
   row('Tension cible',tf.toFixed(1)+' kgf');

 const sl=sa?`${sd}×${sa} mm`:`${sd} mm`;
 const cl=cross===0?'Radial':`${cross}×`;

 document.getElementById('summary').innerHTML=`
   <div class="sumh">Résumé de configuration</div>
   <div class="sumg">
     <div class="si">ERD<strong>${erd.toFixed(1)} mm</strong></div>
     <div class="si">Roue<strong>${wtype==='avant'?'Avant':'Arrière'}</strong></div>
     <div class="si">Nb rayons<strong>${n} (${h}/côté)</strong></div>
     <div class="si">Croisement<strong>${cl}</strong></div>
     <div class="si">Section rayon<strong>${sl}</strong></div>
     <div class="si">Ratio faible/forte<strong>${ratioDisp}</strong></div>
     <div class="si">Asymétrie jante<strong>${asym>0?'+':''}${asym} mm</strong></div>
     <div class="si">Corr. trou bride<strong>−${(trou/2).toFixed(3)} mm</strong></div>
     <div class="si">Aire section<strong>${area().toFixed(3)} mm²</strong></div>
     <div class="si">Différence L<strong>${Math.abs(Lfo-Lfa).toFixed(1)} mm</strong></div>
   </div>`;

 playValidation();
 document.getElementById('results').classList.add('show');
 setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}),80);
}
</script>
