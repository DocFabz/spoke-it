<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#232a38"/>
      <stop offset="100%" stop-color="#181c24"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5aaec9"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="rgba(126,200,227,0.25)" stroke-width="0.8"/>

  <!-- Rim -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#7ec8e3" stroke-width="1.4" stroke-opacity="0.7"/>

  <!-- 8 spokes, alternating colors -->
  <!-- 0° -->
  <line x1="16" y1="16" x2="16" y2="4.2" stroke="#7ec8e3" stroke-width="0.9" stroke-opacity="0.75"/>
  <!-- 45° -->
  <line x1="16" y1="16" x2="24.5" y2="7.5" stroke="#e8927c" stroke-width="0.9" stroke-opacity="0.65"/>
  <!-- 90° -->
  <line x1="16" y1="16" x2="27.8" y2="16" stroke="#7ec8e3" stroke-width="0.9" stroke-opacity="0.75"/>
  <!-- 135° -->
  <line x1="16" y1="16" x2="24.5" y2="24.5" stroke="#e8927c" stroke-width="0.9" stroke-opacity="0.65"/>
  <!-- 180° -->
  <line x1="16" y1="16" x2="16" y2="27.8" stroke="#7ec8e3" stroke-width="0.9" stroke-opacity="0.75"/>
  <!-- 225° -->
  <line x1="16" y1="16" x2="7.5" y2="24.5" stroke="#e8927c" stroke-width="0.9" stroke-opacity="0.65"/>
  <!-- 270° -->
  <line x1="16" y1="16" x2="4.2" y2="16" stroke="#7ec8e3" stroke-width="0.9" stroke-opacity="0.75"/>
  <!-- 315° -->
  <line x1="16" y1="16" x2="7.5" y2="7.5" stroke="#e8927c" stroke-width="0.9" stroke-opacity="0.65"/>

  <!-- Hub -->
  <circle cx="16" cy="16" r="2.8" fill="url(#hub)"/>
  <circle cx="16" cy="16" r="1.2" fill="#181c24"/>
</svg>
